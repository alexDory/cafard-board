<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Plan d'Action CafardLand</title>
</head>
<body>

  <!-- Noise texture overlay -->
  <div class="noise"></div>

  <!-- Login Screen (hidden by JS until auth state is known) -->
  <div class="login-screen hidden" id="loginScreen">
    <div class="login-card">
      <div class="login-logo"></div>
      <h1 class="login-title">Plan d'Action</h1>
      <p class="login-sub">CafardLand</p>
      <button class="login-btn" id="btnLogin">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.962H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.038l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 7.294C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Se connecter avec Google
      </button>
      <p class="login-error hidden" id="loginError"></p>
    </div>
  </div>

  <!-- App (hidden until authenticated) -->
  <div class="app-container hidden" id="appContainer">

  <header class="header">
    <div class="header-left">
      <div class="logo-mark"></div>
      <div class="header-title">
        <h1>Plan d'Action</h1>
        <span class="header-sub">CafardLand</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">Sync</span>
      </div>
      <button class="btn-add desktop-only" id="btnAdd">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Ajouter</span>
      </button>
    </div>
  </header>

  <!-- Mobile Tab Bar -->
  <nav class="tab-bar mobile-only" id="tabBar">
    <button class="tab active" data-tab="todo">
      <div class="tab-dot tab-dot--todo"></div>
      <span class="tab-label">A faire</span>
      <span class="tab-count" data-tab-count="todo">0</span>
    </button>
    <button class="tab" data-tab="doing">
      <div class="tab-dot tab-dot--doing"></div>
      <span class="tab-label">En cours</span>
      <span class="tab-count" data-tab-count="doing">0</span>
    </button>
    <button class="tab" data-tab="done">
      <div class="tab-dot tab-dot--done"></div>
      <span class="tab-label">Fait</span>
      <span class="tab-count" data-tab-count="done">0</span>
    </button>
  </nav>

  <main class="board" id="board">
    <section class="column" data-column="todo">
      <div class="column-header">
        <div class="column-label">
          <div class="column-dot column-dot--todo"></div>
          <span>A faire</span>
        </div>
        <span class="column-count" data-count="todo">0</span>
      </div>
      <div class="column-cards" data-cards="todo"></div>
    </section>

    <section class="column" data-column="doing">
      <div class="column-header">
        <div class="column-label">
          <div class="column-dot column-dot--doing"></div>
          <span>En cours</span>
        </div>
        <span class="column-count" data-count="doing">0</span>
      </div>
      <div class="column-cards" data-cards="doing"></div>
    </section>

    <section class="column" data-column="done">
      <div class="column-header">
        <div class="column-label">
          <div class="column-dot column-dot--done"></div>
          <span>Fait</span>
        </div>
        <span class="column-count" data-count="done">0</span>
      </div>
      <div class="column-cards" data-cards="done"></div>
    </section>
  </main>

  <!-- Swipe hint (shown on first card interaction on mobile) -->
  <div class="swipe-hint hidden" id="swipeHint">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Swipe pour deplacer
  </div>

  <!-- FAB (mobile) -->
  <button class="fab mobile-only" id="fab" aria-label="Ajouter une tache">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 3v16M3 11h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>

  <!-- Modal ajout/edition -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Nouvelle tache</h2>
      <label for="inputTitle">Titre</label>
      <input type="text" id="inputTitle" placeholder="Titre de la tache">
      <label for="inputDesc">Description</label>
      <textarea id="inputDesc" placeholder="Resultat attendu"></textarea>
      <label for="inputWhen">Quand</label>
      <input type="text" id="inputWhen" placeholder="Ex: Cette semaine, Semaine 2...">
      <div class="modal-buttons">
        <button class="btn-delete hidden" id="btnDelete">Supprimer</button>
        <button class="btn-cancel" id="btnCancel">Annuler</button>
        <button class="btn-save" id="btnSave">Enregistrer</button>
      </div>
    </div>
  </div>

  </div><!-- /app-container -->

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.warn('SW registration failed:', err));
    }
  </script>

</body>
</html>
