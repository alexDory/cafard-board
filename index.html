<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e94560">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Plan d'Action CafardLand</title>
</head>
<body>

  <header class="header">
    <h1>Plan d'Action</h1>
    <div class="header-right">
      <div class="status-dot" id="statusDot" title="En ligne"></div>
      <button class="btn-add" id="btnAdd">+ Ajouter</button>
    </div>
  </header>

  <main class="board" id="board">
    <section class="column" data-column="todo">
      <div class="column-header">
        <span>A faire</span>
        <span class="column-count" data-count="todo">0</span>
      </div>
      <div class="column-cards" data-cards="todo"></div>
    </section>

    <section class="column" data-column="doing">
      <div class="column-header">
        <span>En cours</span>
        <span class="column-count" data-count="doing">0</span>
      </div>
      <div class="column-cards" data-cards="doing"></div>
    </section>

    <section class="column" data-column="done">
      <div class="column-header">
        <span>Fait</span>
        <span class="column-count" data-count="done">0</span>
      </div>
      <div class="column-cards" data-cards="done"></div>
    </section>
  </main>

  <!-- Modal ajout/edition -->
  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Nouvelle tache</h2>
      <label for="inputTitle">Titre</label>
      <input type="text" id="inputTitle" placeholder="Titre de la tache">
      <label for="inputDesc">Description</label>
      <textarea id="inputDesc" placeholder="Resultat attendu"></textarea>
      <label for="inputWhen">Quand</label>
      <input type="text" id="inputWhen" placeholder="Ex: Cette semaine, Semaine 2...">
      <div class="modal-buttons">
        <button class="btn-delete hidden" id="btnDelete">Supprimer</button>
        <button class="btn-cancel" id="btnCancel">Annuler</button>
        <button class="btn-save" id="btnSave">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.warn('SW registration failed:', err));
    }
  </script>

</body>
</html>
